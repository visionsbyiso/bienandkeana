    <path d="M62 70 Q 200 56 400 64 Q 600 56 738 70" stroke-width="1.6" opacity="0.78"/>
    <path d="M120 86 Q 220 74 320 84" stroke-width="1.2" opacity="0.55"/>
    <path d="M480 84 Q 580 74 680 86" stroke-width="1.2" opacity="0.55"/>
