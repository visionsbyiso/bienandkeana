  <g>
    <circle cx="51" cy="49" r="7.5" fill="#F1C7CF" opacity="0.9"/>
    <circle cx="51" cy="49" r="2.5" fill="#E94493" opacity="0.65"/>
    <circle cx="76" cy="40" r="5.5" fill="#B7C8F2" opacity="0.9"/>
    <circle cx="99" cy="30" r="6.5" fill="#F0DFA0" opacity="0.9"/>
    <circle cx="99" cy="30" r="2" fill="#E2A434" opacity="0.6"/>
    <circle cx="127" cy="24" r="5" fill="#C8B6E0" opacity="0.9"/>
    <circle cx="156" cy="20" r="4.5" fill="#F1C7CF" opacity="0.85"/>
    <circle cx="186" cy="18" r="4" fill="#A9C9A4" opacity="0.85"/>
    <circle cx="214" cy="22" r="3.5" fill="#F0DFA0" opacity="0.85"/>
