  <!-- Tiny dots / pollen accents -->
  <g fill="#7A5238" opacity="0.45">
    <circle cx="42" cy="58" r="1"/>
    <circle cx="64" cy="50" r="1"/>
    <circle cx="88" cy="36" r="1"/>
    <circle cx="113" cy="28" r="1"/>
    <circle cx="142" cy="22" r="1"/>
    <circle cx="172" cy="20" r="1"/>
