      <circle cx="128" cy="62" r="5" fill="#B7C8F2"/>
      <circle cx="78" cy="108" r="6" fill="#E94493" opacity="0.65"/>
      <circle cx="156" cy="146" r="7" fill="#C8B6E0"/>
      <circle cx="138" cy="180" r="6" fill="#A9C9A4"/>
