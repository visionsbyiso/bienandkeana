<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120" fill="none">
  <defs>
    <filter id="wc1" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"/>
    </filter>
  </defs>

  <!-- Main curved stem (varied weight: thicker at base, thinner at tip) -->
  <path d="M8 102 C 54 74 103 56 153 45 c 28 -6 61 -10 99 -15" stroke="#6B5238" stroke-width="1.7" stroke-linecap="round" fill="none" filter="url(#wc1)"/>
  <path d="M22 96 C 60 78 100 64 140 56" stroke="#7A5238" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Side stems / offshoots -->
  <g stroke="#7A8B63" stroke-width="1.2" stroke-linecap="round" fill="none">
    <path d="M69 73 c -5 -8 -10 -15 -16 -22"/>
    <path d="M91 65 c -4 -8 -8 -16 -14 -24"/>
    <path d="M122 55 c -4 -8 -7 -15 -12 -23"/>
    <path d="M149 48 c -3 -8 -6 -15 -10 -22"/>
    <path d="M176 42 c -2 -8 -5 -15 -8 -22"/>
    <path d="M104 70 c 4 6 9 10 16 11" opacity="0.6"/>
    <path d="M138 60 c 5 5 11 8 18 8" opacity="0.6"/>
  </g>

  <!-- Painted leaves -->
  <g fill="#9DA85B" opacity="0.7">
    <path d="M58 54 Q 50 46 44 52 Q 48 60 58 54 Z"/>
    <path d="M84 44 Q 76 36 70 42 Q 74 50 84 44 Z"/>
    <path d="M118 36 Q 110 28 106 36 Q 110 42 118 36 Z"/>
    <path d="M158 30 Q 152 22 146 30 Q 150 36 158 30 Z"/>
    <path d="M188 24 Q 182 18 176 26 Q 180 32 188 24 Z"/>
