<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0E2C5"/>
      <stop offset="1" stop-color="#D9C8AB"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="62%">
      <stop offset="0" stop-color="#FFFCF1"/>
      <stop offset="1" stop-color="#D9C8AB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="silhouette" cx="50%" cy="38%" r="55%">
      <stop offset="0" stop-color="#A8916D"/>
      <stop offset="1" stop-color="#8C7551"/>
    </radialGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#halo)"/>

  <!-- Soft silhouette portrait � head + shoulders so the frame reads as a "photo" -->
  <g opacity="0.55">
    <path d="M80 600 Q 80 460 200 416 Q 248 404 300 404 Q 352 404 400 416 Q 520 460 520 600 Z" fill="url(#silhouette)"/>
    <rect x="266" y="362" width="68" height="60" rx="14" fill="url(#silhouette)"/>
    <ellipse cx="300" cy="280" rx="100" ry="116" fill="url(#silhouette)"/>
  </g>

  <!-- Caption -->
  <g font-family="'Libre Caslon Text', Georgia, serif" fill="#3A2A1B">
    <text x="300" y="544" text-anchor="middle" font-size="22" letter-spacing="6" font-style="italic" opacity="0.78">your photo here</text>
    <text x="300" y="572" text-anchor="middle" font-size="11" letter-spacing="4" opacity="0.55">SQUARE � 600 � 600</text>
  </g>
</svg>
